name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnchorKillFix-jar
          path: target/AnchorKillFix-*.jar
          if-no-files-found: error

      - name: Create GitHub Release (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnchorKillFix Build #${{ github.run_number }}"
          body: |
            Automated release from commit ${{ github.sha }}
            Built with Paper API 1.21.4-R0.1-SNAPSHOT (1.21.x compatible)
          files: target/AnchorKillFix-*.jar
          fail_on_unmatched_files: true
